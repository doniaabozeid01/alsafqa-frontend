<section class="page-hero">
  <div class="page-hero-overlay"></div>
  <div class="container page-hero-inner">
    <span class="page-hero-tag" appReveal>{{ tag }}</span>
    <h1 class="page-hero-title" appReveal [revealDelay]="100">{{ title }}</h1>
    <p class="page-hero-subtitle" appReveal [revealDelay]="200">{{ subtitle }}</p>
  </div>
</section>
