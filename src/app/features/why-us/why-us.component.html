<app-page-hero [tag]="hero.tag" [title]="hero.title" [subtitle]="hero.subtitle"></app-page-hero>

<section class="section values-section">
  <div class="container">
    <span class="section-tag" appReveal>{{ hero.tag }}</span>
    <h2 class="section-title" appReveal>{{ hero.title }}</h2>

    <div class="values-grid">
      <article
        class="value-card"
        *ngFor="let value of values; let i = index"
        appReveal="up"
        [revealDelay]="i * 120"
      >
        <div class="value-icon" [innerHTML]="value.icon"></div>
        <h3>{{ value.title }}</h3>
        <p>{{ value.description }}</p>
      </article>
    </div>
  </div>
</section>

<section class="section stats-section">
  <div class="container">
    <h2 class="section-title" appReveal>أرقام تتحدث عنا</h2>
    <div class="stats-grid">
      <div class="stat" *ngFor="let stat of stats; let i = index" appReveal="zoom" [revealDelay]="i * 100">
        <div class="stat-icon" [innerHTML]="stat.icon"></div>
        <strong
          appCountUp
          [countTo]="stat.value"
          [prefix]="stat.prefix"
          [suffix]="stat.suffix"
        ></strong>
        <span>{{ stat.label }}</span>
      </div>
    </div>
  </div>
</section>

<section class="section cta-strip">
  <div class="container" appReveal>
    <h2>جاهز لبدء شراكتك معنا؟</h2>
    <a routerLink="/contact" class="btn btn-gold">تواصل معنا الآن</a>
  </div>
</section>
