<app-page-hero [tag]="hero.tag" [title]="hero.title" [subtitle]="hero.subtitle"></app-page-hero>

<section class="section" *ngIf="items.length">
  <div class="container">
    <div class="gallery-grid">
      <figure
        class="gallery-card"
        *ngFor="let item of items; let i = index"
        appReveal="up"
        [revealDelay]="i * 80"
        (click)="openLightbox(itemImage(item))"
      >
        <img [src]="itemImage(item)" [alt]="itemTitle(item)" loading="lazy" />
        <figcaption>
          <span class="gallery-category">{{ itemCategory(item) }}</span>
          <span class="gallery-alt">{{ itemTitle(item) }}</span>
        </figcaption>
      </figure>
    </div>
  </div>
</section>

<section class="section" *ngIf="!items.length">
  <div class="container">
    <p class="gallery-empty">{{ 'gallery.empty' | translate }}</p>
  </div>
</section>

<div class="lightbox" *ngIf="lightboxSrc" (click)="closeLightbox()">
  <img [src]="lightboxSrc" alt="" class="lightbox-img" (click)="$event.stopPropagation()" />
  <button type="button" class="lightbox-close" (click)="closeLightbox()" [attr.aria-label]="'gallery.close' | translate">×</button>
</div>
