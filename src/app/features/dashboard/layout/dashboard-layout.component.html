<div class="dash" [class.menu-open]="menuOpen">
  <aside class="sidebar" [class.open]="menuOpen">
    <div class="sidebar-brand">
      <img src="assets/brand/logo-icon.png" alt="" />
      <div>
        <strong>الاتحاد التجارية</strong>
        <span>لوحة التحكم</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a
        *ngFor="let item of nav"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact }"
        (click)="closeMenu()"
      >
        <span class="nav-ico" [attr.data-icon]="item.icon" aria-hidden="true"></span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-user" *ngIf="user">
      <div class="avatar">{{ user.email.charAt(0).toUpperCase() }}</div>
      <div class="user-meta">
        <strong dir="ltr">{{ user.email }}</strong>
        <span>{{ user.role }}</span>
      </div>
    </div>
  </aside>

  <div class="dash-main">
    <header class="topbar">
      <button
        type="button"
        class="menu-btn"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen"
        aria-label="القائمة"
      >
        <span></span><span></span><span></span>
      </button>

      <div class="topbar-brand">
        <strong>الاتحاد التجارية</strong>
        <span>لوحة التحكم</span>
      </div>

      <div class="topbar-actions">
        <span class="topbar-email" *ngIf="user" dir="ltr">{{ user.email }}</span>
        <button type="button" class="logout-btn" (click)="logout()">
          تسجيل الخروج
        </button>
      </div>
    </header>

    <div class="dash-content">
      <router-outlet></router-outlet>
    </div>
  </div>

  <div class="sidebar-backdrop" *ngIf="menuOpen" (click)="closeMenu()"></div>
</div>
