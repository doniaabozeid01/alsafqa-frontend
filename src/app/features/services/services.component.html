<app-page-hero [tag]="hero.tag" [title]="hero.title" [subtitle]="hero.subtitle"></app-page-hero>

<section class="section">
  <div class="container">
    <div class="services-grid">
      <article
        class="service-card"
        *ngFor="let service of services; let i = index"
        appReveal="up"
        [revealDelay]="i * 120"
      >
        <div class="service-icon" [innerHTML]="service.icon"></div>
        <h3>{{ service.title }}</h3>
        <p>{{ service.description }}</p>
      </article>
    </div>

    <div class="page-cta" appReveal>
      <a routerLink="/contact" class="btn btn-gold">اطلب عرض سعر</a>
    </div>
  </div>
</section>
