<app-page-hero [tag]="hero.tag" [title]="hero.title" [subtitle]="hero.subtitle"></app-page-hero>

<section class="section">
  <div class="container">
    <div class="products-grid">
      <article
        class="product-card"
        *ngFor="let category of categories; let i = index"
        appReveal="up"
        [revealDelay]="i * 100"
      >
        <div class="card-media">
          <img [src]="category.image" [alt]="category.title" loading="lazy" />
          <span class="card-badge">{{ category.subtitle }}</span>
        </div>
        <h3>{{ category.title }}</h3>
      </article>
    </div>

    <div class="page-cta" appReveal>
      <a routerLink="/contact" class="btn btn-outline">اطلب توريد منتجات</a>
    </div>
  </div>
</section>
