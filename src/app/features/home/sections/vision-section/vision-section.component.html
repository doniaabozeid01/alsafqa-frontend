<section class="section vision overflow-hidden">
  <div class="container">
    <div class="vision-panel" appReveal="zoom">
      <div class="vision-head" appReveal [revealDelay]="80">
        <span class="panel-tag">{{ 'home.vision.tag' | translate }}</span>
        <h2 class="panel-title">{{ 'home.vision.title' | translate }}</h2>
      </div>

      <div class="vision-grid">
        <article
          class="vision-card"
          *ngFor="let item of items; let i = index"
          appReveal="up"
          [revealDelay]="120 + i * 50"
        >
          <span class="vision-index">{{ i + 1 | number: '2.0-0' }}</span>
          <p>{{ item | translate }}</p>
        </article>
      </div>
    </div>
  </div>
</section>
