<section class="section vision overflow-hidden">
  <div class="container">
    <div class="vision-head" appReveal>
      <span class="section-tag">{{ 'home.vision.tag' | translate }}</span>
      <h2 class="section-title">{{ 'home.vision.title' | translate }}</h2>
    </div>

    <div class="vision-grid">
      <article
        class="vision-card"
        *ngFor="let item of items; let i = index"
        appReveal="up"
        [revealDelay]="70 + i * 70"
      >
        <span class="vision-index">{{ pad(i + 1) }}</span>
        <p>{{ item.key | translate }}</p>
      </article>
    </div>
  </div>
</section>
