<section class="section products" *ngIf="products.length">
  <div class="container">
    <span class="section-tag" appReveal>{{ 'home.products.tag' | translate }}</span>
    <h2 class="section-title" appReveal>{{ 'home.products.title' | translate }}</h2>

    <div class="carousel" appReveal="up" [revealDelay]="150">
      <button class="arrow" type="button" (click)="scroll(-1)" [attr.aria-label]="'common.prev' | translate">
        ‹
      </button>

      <div class="track" #track>
        <article class="product-card" *ngFor="let product of products">
          <div class="card-media">
            <img
              [src]="productImage(product)"
              [alt]="productTitle(product)"
              loading="lazy"
            />
            <span class="card-badge">{{ brandLabel(product) }}</span>
          </div>
          <h3>{{ productTitle(product) }}</h3>
        </article>
      </div>

      <button class="arrow" type="button" (click)="scroll(1)" [attr.aria-label]="'common.next' | translate">
        ›
      </button>
    </div>

    <div class="products-cta" appReveal [revealDelay]="250">
      <a routerLink="/products" class="btn btn-outline">{{ 'common.viewAllProducts' | translate }}</a>
    </div>
  </div>
</section>
