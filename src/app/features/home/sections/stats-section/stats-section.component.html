<section class="section stats overflow-hidden">
  <div class="container">
    <div class="stats-panel" appReveal="zoom">
      <div class="panel-image" appReveal="right" [revealDelay]="200">
        <img
          src="https://images.unsplash.com/photo-1553413077-190dd305871c?auto=format&fit=crop&w=900&q=70"
          [alt]="'home.values.title' | translate"
          loading="lazy"
        />
      </div>

      <div class="panel-body">
        <span class="panel-tag" appReveal [revealDelay]="150">{{ 'home.values.tag' | translate }}</span>
        <h2 class="panel-title" appReveal [revealDelay]="250">{{ 'home.values.title' | translate }}</h2>

        <div class="values-grid">
          <article
            class="value"
            *ngFor="let value of values; let i = index"
            appReveal="up"
            [revealDelay]="300 + i * 120"
          >
            <div class="value-icon" [innerHTML]="value.icon"></div>
            <h3>{{ value.title }}</h3>
            <p>{{ value.description }}</p>
          </article>
        </div>
      </div>
    </div>
  </div>
</section>
