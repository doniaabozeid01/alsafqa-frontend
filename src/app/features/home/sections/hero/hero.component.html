<section class="hero">
  <div class="container">
    <div class="hero-card">
      <!-- Layered background -->
      <div class="hero-bg"></div>
      <div class="hero-overlay"></div>

      <!-- Flying plane -->
      <div class="plane">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M21.5 15.5 13.5 11V4.75a1.5 1.5 0 0 0-3 0V11l-8 4.5V17l8-2.25v5.5L8.25 21.5V23L12 22l3.75 1v-1.5L13.5 20.25v-5.5l8 2.25v-1.5Z"
          />
        </svg>
      </div>

      <!-- Content -->
      <div class="hero-content">
        <h1 class="hero-title">
          <span class="line line-1">نربط الأسواق</span>
          <span class="line line-2">نصل <em>للعالم</em></span>
        </h1>
        <p class="hero-subtitle">
          حلول متكاملة للاستيراد والتصدير والشحن
          <br />
          بأعلى معايير الجودة والموثوقية
        </p>
        <a routerLink="/services" class="btn btn-gold hero-cta">
          اكتشف خدماتنا
          <span class="cta-arrow">←</span>
        </a>
      </div>

      <!-- Floating shipping chips -->
      <div class="chip chip-air">
        <span class="chip-icon">✈️</span>
        <span class="chip-text">
          <b>شحن جوي</b>
          <small>سرعة وأمان</small>
        </span>
      </div>

      <div class="chip chip-sea">
        <span class="chip-icon">⚓</span>
        <span class="chip-text">
          <b>شحن بحري</b>
          <small>إلى جميع أنحاء العالم</small>
        </span>
      </div>

      <div class="chip chip-land">
        <span class="chip-icon">🚚</span>
        <span class="chip-text">
          <b>شحن بري</b>
          <small>داخل جميع المحافظات</small>
        </span>
      </div>

      <!-- Scroll indicator -->
      <div class="scroll-hint">
        <span class="mouse"><span class="wheel"></span></span>
      </div>
    </div>
  </div>
</section>
