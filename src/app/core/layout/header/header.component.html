<!-- Top bar -->
<div class="topbar">
  <div class="container topbar-inner">
    <div class="topbar-contact">
      <a *ngFor="let phone of contact.phones" [href]="'tel:' + phone" class="topbar-item">
        <span class="topbar-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.81.36 1.6.68 2.35a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.75.32 1.54.55 2.35.68A2 2 0 0 1 22 16.92z" />
          </svg>
        </span>
        {{ phone }}
      </a>
      <a href="mailto:{{ contact.email }}" class="topbar-item">
        <span class="topbar-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <path d="m3 7 9 6 9-6" />
          </svg>
        </span>
        {{ contact.email }}
      </a>
    </div>
    <button class="lang-switch" type="button" (click)="toggleLang()" [attr.aria-label]="lang.switchLabel">
      {{ lang.switchLabel }}
    </button>
  </div>
</div>

<!-- Main navbar -->
<header class="navbar" [class.is-scrolled]="scrolled">
  <div class="container navbar-inner">
    <a routerLink="/" class="logo" (click)="closeMenu()">
      <img src="assets/brand/logo-icon.png" [alt]="'brand.name' | translate" class="logo-img" />
      <span class="logo-text">
        <span class="logo-name" [innerHTML]="'brand.nameHtml' | translate"></span>
        <span class="logo-sub">{{ 'brand.tagline' | translate }}</span>
      </span>
    </a>

    <nav class="nav-links" [class.open]="menuOpen">
      <a
        *ngFor="let link of navLinks"
        [routerLink]="link.path"
        [fragment]="link.fragment"
        [routerLinkActive]="link.fragment ? '' : 'active'"
        [routerLinkActiveOptions]="{ exact: link.exact || false }"
        (click)="closeMenu()"
      >
        {{ link.label }}
      </a>
      <a routerLink="/login" class="nav-signin-mobile" (click)="closeMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0zM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
        {{ 'nav.login' | translate }}
      </a>
    </nav>

    <div class="nav-actions">
      <a routerLink="/login" class="nav-signin">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0zM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
        {{ 'nav.login' | translate }}
      </a>
    </div>

    <button
      class="burger"
      type="button"
      [class.open]="menuOpen"
      (click)="toggleMenu()"
      [attr.aria-label]="'nav.menu' | translate"
    >
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
