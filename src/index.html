  <!-- Resolve absolute share URLs for the current host (helps social previews) -->
  <script>
    (function () {
      try {
        var origin = window.location.origin;
        var path = window.location.pathname || '/';
        var image = origin + '/assets/brand/og-image.png';
        var url = origin + (path === '/' ? '/' : path);
        function set(attr, name, value) {
          var el = document.querySelector('meta[' + attr + '="' + name + '"]');
          if (el) el.setAttribute('content', value);
        }
        set('property', 'og:url', url);
        set('property', 'og:image', image);
        set('property', 'og:image:secure_url', image);
        set('name', 'twitter:image', image);
        var canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) canonical.setAttribute('href', url);
        var imageSrc = document.querySelector('link[rel="image_src"]');
        if (imageSrc) imageSrc.setAttribute('href', image);
      } catch (e) {}
    })();
  </script>
